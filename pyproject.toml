[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tessera-rag"
dynamic = ["version"]
description = "Multimodal retrieval-augmented generation framework combining image and text encoders"
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
authors = [{ name = "Nathanm" }]
dependencies = [
    "numpy>=1.21",
]

[tool.hatch.version]
path = "tessera/__about__.py"

[tool.hatch.build.targets.wheel]
packages = ["tessera"]

[tool.ruff]
line-length = 100
target-version = "py39"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B", "C4", "SIM"]
# B905: zip(strict=...) is 3.10+, we still support 3.9.
ignore = ["B905"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E501"]
"examples/*" = ["E501", "T201"]
